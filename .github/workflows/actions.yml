name: Lint Actions

on:
  workflow_call:

jobs:
  actions-linter:
    name: Check GitHub Actions issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: lidofinance/linters/.github/actions/lint-actions@master
