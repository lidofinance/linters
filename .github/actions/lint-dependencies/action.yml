name: 'Dependencies linter'
description: 'Scan dependencies for security issues via Socket.dev'

inputs:
  socket-cli-version:
    description: "Socket CLI version"
    required: false
    default: "2.2.71"
  reach-version:
    description: "Reach version for reachability analysis"
    required: false
    default: "14.12.183"
  uv-version:
    description: "uv version (required by Socket reachability analysis)"
    required: false
    default: "0.10.2"
  node-version:
    description: "Node.js version"
    required: false
    default: "20"
  socket-security-api-key:
    description: "Socket.dev API key"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"

    # --reach uses an npm tool under the hood, so ensure node/npm/npx exist.
    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}

    # uv is a required dependency for Socket CLI reachability analysis (--reach)
    - name: Install uv
      env:
        UV_VERSION: ${{ inputs.uv-version }}
      run: pip install "uv==$UV_VERSION"
      shell: bash

    - name: Install Socket CLI
      env:
        SOCKET_CLI_VERSION: ${{ inputs.socket-cli-version }}
      run: pip install "socketsecurity==$SOCKET_CLI_VERSION"
      shell: bash

    - name: Socket scan
      env:
        SOCKET_SECURITY_API_TOKEN: ${{ inputs.socket-security-api-key }}
        GH_API_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
        REACH_VERSION: ${{ inputs.reach-version }}
      run: |
        socketcli \
          --reach \
          --reach-version "$REACH_VERSION" \
          --target-path "$GITHUB_WORKSPACE" \
          --scm github \
          --pr-number "$PR_NUMBER" \
          --ignore-commit-files
      shell: bash
